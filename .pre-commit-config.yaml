# Pre-commit hooks mirror CI exactly — all gates call mise tasks.
# Install: pre-commit install (or mise run setup)
repos:
  - repo: local
    hooks:
      - id: fmt
        name: Format
        entry: mise run fmt
        language: system
        always_run: true
        pass_filenames: false

      - id: lint
        name: Lint
        entry: mise run lint
        language: system
        always_run: true
        pass_filenames: false

      - id: typecheck
        name: Type Check
        entry: mise run typecheck
        language: system
        always_run: true
        pass_filenames: false

      - id: test
        name: Test
        entry: mise run test
        language: system
        always_run: true
        pass_filenames: false
