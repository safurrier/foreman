#:schema https://mise.jdx.dev/schema/mise.json

# ─────────────────────────────────────────────
# foreman — mise configuration
# ─────────────────────────────────────────────

[tools]
python = "3.12"
uv = "latest"
rust = "stable"

[env]
MISE_PROJECT_ROOT = "{{config_root}}"
SCAFFOLD_PROJECT_NAME  = "foreman"
SCAFFOLD_PROJECT_SHAPE = "single"
SCAFFOLD_PROJECT_STACK = "rust"
