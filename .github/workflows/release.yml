name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: Verify Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v3
        with:
          install: true
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Setup
        run: mise run setup

      - name: Verify tag matches crate version
        run: |
          python3 - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          version = tomllib.loads(Path("Cargo.toml").read_text())["package"]["version"]
          tag = os.environ["GITHUB_REF_NAME"]
          expected = f"v{version}"
          if tag != expected:
              raise SystemExit(
                  f"release tag {tag!r} does not match Cargo.toml version {expected!r}"
              )
          PY

      - name: Verify
        run: mise run verify

      - name: Upload release validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-validation-evidence
          path: |
            .ai/validation/ux/
            .ai/validation/release/
          if-no-files-found: error

  build:
    name: Build ${{ matrix.archive_name }}
    runs-on: ${{ matrix.os }}
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            archive_name: foreman-linux-x86_64
          - os: macos-15-intel
            archive_name: foreman-macos-x86_64
          - os: macos-14
            archive_name: foreman-macos-aarch64
    steps:
      - uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v3
        with:
          install: true
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Setup
        run: mise run setup

      - name: Verify tag matches crate version
        run: |
          python3 - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          version = tomllib.loads(Path("Cargo.toml").read_text())["package"]["version"]
          tag = os.environ["GITHUB_REF_NAME"]
          expected = f"v{version}"
          if tag != expected:
              raise SystemExit(
                  f"release tag {tag!r} does not match Cargo.toml version {expected!r}"
              )
          PY

      - name: Build release binaries
        run: cargo build --release --bins

      - name: Package release archive
        shell: bash
        run: |
          set -euo pipefail
          archive_root="dist/${{ matrix.archive_name }}"
          mkdir -p "${archive_root}"
          cp README.md "${archive_root}/"
          cp target/release/foreman "${archive_root}/"
          cp target/release/foreman-claude-hook "${archive_root}/"
          cp target/release/foreman-codex-hook "${archive_root}/"
          cp target/release/foreman-pi-hook "${archive_root}/"
          tar -C dist -czf "dist/${{ matrix.archive_name }}.tar.gz" "${{ matrix.archive_name }}"
          shasum -a 256 "dist/${{ matrix.archive_name }}.tar.gz" > "dist/${{ matrix.archive_name }}.sha256"

      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive_name }}
          path: |
            dist/${{ matrix.archive_name }}.tar.gz
            dist/${{ matrix.archive_name }}.sha256

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download release bundles
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.sha256
          generate_release_notes: true
